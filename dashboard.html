<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSSMAN MARKET - لوحة النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #1E1E2D; --bg-light: #F3F6F9; --card-bg: #FFFFFF;
            --primary: #3699FF; --success: #1BC5BD; --danger: #F64E60;
            --text-main: #3F4254; --text-muted: #B5B5C3; --border: #EBEDF3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-light); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* القائمة الجانبية */
        .sidebar { width: 250px; background-color: var(--bg-dark); display: flex; flex-direction: column; color: white; }
        .brand { padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 1.5rem; font-weight: 800; }
        .nav-menu { list-style: none; padding: 20px 0; flex: 1; }
        .nav-menu li a { display: flex; align-items: center; padding: 15px 25px; color: var(--text-muted); text-decoration: none; font-weight: 500; gap: 15px; cursor: pointer; transition: 0.2s; }
        .nav-menu li.active a, .nav-menu li a:hover { background-color: rgba(255,255,255,0.05); color: var(--primary); border-right: 4px solid var(--primary); }

        .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .top-header { background: var(--card-bg); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .status-badge { padding: 6px 15px; border-radius: 20px; font-weight: 700; font-size: 0.9rem; }
        .status-online { background-color: #D1F3E0; color: #0A7C43; }
        .status-offline { background-color: #FFE2E5; color: #F64E60; }

        /* إدارة الصفحات (SPA) */
        .page-view { display: none; height: calc(100vh - 70px); overflow-y: auto; padding: 20px; }
        .page-view.active { display: block; }

        /* ستايل الكاشير */
        .pos-container { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; height: 100%; }
        .barcode-section, .cart-section, .pos-right { background: var(--card-bg); border-radius: 12px; box-shadow: 0 0 10px rgba(0,0,0,0.03); padding: 20px; }
        .pos-left { display: flex; flex-direction: column; gap: 20px; height: 100%; }
        .barcode-input { flex: 1; padding: 15px; font-size: 1.2rem; border: 2px solid var(--border); border-radius: 8px; outline: none; }
        .cart-table { width: 100%; border-collapse: collapse; }
        .cart-table th { background: var(--bg-light); padding: 15px; text-align: right; color: var(--text-muted); }
        .cart-table td { padding: 15px; border-bottom: 1px solid var(--border); }
        .qty-btn { width: 30px; height: 30px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }
        .pos-right { display: flex; flex-direction: column; }
        .btn-pay { width: 100%; padding: 20px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 1.5rem; font-weight: 800; cursor: pointer; margin-top: auto; }
        .btn-pay:disabled { background: #ccc; }
        .input-group input { width: 100%; padding: 15px; font-size: 1.5rem; border: 2px solid var(--border); border-radius: 8px; margin-top: 5px; }

        /* ستايل إدارة المخازن */
        .inventory-card { background: var(--card-bg); border-radius: 12px; padding: 30px; box-shadow: 0 0 10px rgba(0,0,0,0.03); max-width: 800px; margin: 0 auto; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; outline: none; font-size: 1rem; }
        .form-group input:focus, .form-group select:focus { border-color: var(--primary); }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%; }
        .image-preview { width: 100%; height: 200px; border: 2px dashed var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-top: 27px; overflow: hidden; }
        .image-preview img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">OSSMAN<br><span style="font-size: 1rem; color: var(--primary);">SYSTEMS</span></div>
        <ul class="nav-menu">
            <li class="active" onclick="switchTab('pos-view', this)"><a href="#"><i class="fas fa-desktop"></i> شاشة الكاشير</a></li>
            <li onclick="switchTab('inventory-view', this)"><a href="#"><i class="fas fa-box-open"></i> إضافة للمخزن</a></li>
            <li><a href="#"><i class="fas fa-file-invoice-dollar"></i> الحسابات</a></li>
        </ul>
    </aside>

    <main class="workspace">
        <header class="top-header">
            <h2 id="page-title" style="font-size: 1.4rem;">شاشة المبيعات (نقطة البيع)</h2>
            <div style="display: flex; gap: 20px;">
                <div class="status-badge status-online" id="connection-status"><i class="fas fa-wifi"></i> متصل</div>
            </div>
        </header>

        <div id="pos-view" class="page-view active">
            <div class="pos-container">
                <div class="pos-left">
                    <div class="barcode-section">
                        <input type="text" class="barcode-input" id="barcode-scanner" placeholder="اضرب الباركود هنا..." autofocus>
                        <button class="btn-pay" style="width: auto; padding: 0 30px; font-size: 1.2rem; background: var(--primary);" onclick="scanBarcode()">إضافة</button>
                    </div>
                    <div class="cart-section">
                        <table class="cart-table">
                            <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>الإجمالي</th><th></th></tr></thead>
                            <tbody id="cart-items">
                                <tr><td colspan="5" style="text-align: center; color: var(--primary); padding: 40px;"><i class="fas fa-spinner fa-spin" style="font-size: 2rem;"></i> جاري تحميل المخزن...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="pos-right">
                    <div style="font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 20px;">الإجمالي: <span id="grand-total">0.00</span> ج.م</div>
                    <div class="input-group">
                        <label>المدفوع (ج.م):</label>
                        <input type="number" id="amount-paid" placeholder="0.00" oninput="calculateChange()">
                    </div>
                    <div class="change-box" style="margin-top: 15px; margin-bottom: 15px; text-align: center; background: var(--bg-light); padding: 15px; border-radius: 8px;">
                        <span>الباقي للعميل</span><h3 id="amount-change" style="color: var(--danger); font-size: 2rem;">0.00 ج.م</h3>
                    </div>
                    <button class="btn-pay" onclick="processPayment()"><i class="fas fa-print"></i> إصدار الفاتورة</button>
                </div>
            </div>
        </div>

        <div id="inventory-view" class="page-view">
            <div class="inventory-card">
                <h3 style="margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px;">إضافة منتج جديد</h3>
                
                <form id="addProductForm" onsubmit="submitProduct(event)">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>الباركود (اسحب بالاسكانر)</label>
                            <input type="text" id="inv-barcode" required>
                        </div>
                        <div class="form-group">
                            <label>اسم المنتج</label>
                            <input type="text" id="inv-name" required>
                        </div>
                        <div class="form-group">
                            <label>القسم</label>
                            <select id="inv-category" required>
                                <option value="أجبان">أجبان</option>
                                <option value="معلبات">معلبات</option>
                                <option value="مخبوزات">مخبوزات</option>
                                <option value="لحوم">لحوم</option>
                                <option value="خضروات">خضروات</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>الكمية المتاحة (في المخزن)</label>
                            <input type="number" id="inv-stock" required>
                        </div>
                        <div class="form-group">
                            <label>سعر التكلفة (للإدارة)</label>
                            <input type="number" id="inv-cost" required>
                        </div>
                        <div class="form-group">
                            <label>سعر البيع (للجمهور)</label>
                            <input type="number" id="inv-price" required>
                        </div>
                        <div class="form-group">
                            <label>رابط الصورة (URL)</label>
                            <input type="text" id="inv-image" placeholder="مثال: https://.../image.jpg" oninput="previewImage()">
                        </div>
                        <div class="image-preview" id="img-preview">
                            <span style="color: var(--text-muted);">معاينة الصورة</span>
                        </div>
                    </div>
                    <button type="submit" class="btn-submit" id="btn-add-product"><i class="fas fa-save"></i> حفظ في قاعدة البيانات</button>
                </form>
            </div>
        </div>

    </main>

    <script>
        // ⚠️ حط الرابط بتاعك هنا
        const API_URL = "https://script.google.com/macros/s/AKfycbytdP5zPsnq2_mnKUm2iSDDNlJ-4MOWZdrWveqEbYMyakBXzJ38LywnyAW25TlWaSgA/exec";
        let productsDB = []; let cart = [];

        // إدارة التنقل بين الصفحات (SPA)
        function switchTab(tabId, el) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-menu li').forEach(li => li.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            
            if(tabId === 'pos-view') {
                document.getElementById('page-title').innerText = 'شاشة المبيعات (نقطة البيع)';
                document.getElementById('barcode-scanner').focus();
            } else {
                document.getElementById('page-title').innerText = 'إدارة المخازن';
                document.getElementById('inv-barcode').focus();
            }
        }

        // معاينة الصورة في صفحة المخزن
        function previewImage() {
            const url = document.getElementById('inv-image').value;
            const preview = document.getElementById('img-preview');
            if(url) {
                preview.innerHTML = `<img src="${url}" alt="Preview" onerror="this.src='https://via.placeholder.com/200?text=رابط+غير+صالح'">`;
            } else {
                preview.innerHTML = `<span style="color: var(--text-muted);">معاينة الصورة</span>`;
            }
        }

        // إرسال المنتج الجديد لجوجل شيت
        async function submitProduct(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-add-product');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            btn.disabled = true;

            const newProduct = {
                action: 'addProduct',
                barcode: document.getElementById('inv-barcode').value,
                name: document.getElementById('inv-name').value,
                category: document.getElementById('inv-category').value,
                stock: document.getElementById('inv-stock').value,
                cost: document.getElementById('inv-cost').value,
                price: document.getElementById('inv-price').value,
                image_url: document.getElementById('inv-image').value
            };

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(newProduct) });
                const result = await response.json();
                if(result.status === 'success') {
                    alert("عاش! تم إضافة المنتج للمخزن وهيسمّع في الموقع فوراً.");
                    document.getElementById('addProductForm').reset();
                    previewImage();
                    loadProducts(); // تحديث الذاكرة علشان الكاشير يقراه علطول
                }
            } catch (error) {
                alert("حدث خطأ أثناء الاتصال بالخادم.");
            }
            btn.innerHTML = '<i class="fas fa-save"></i> حفظ في قاعدة البيانات';
            btn.disabled = false;
        }

        // ================= أكواد الكاشير =================
        async function loadProducts() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                productsDB = data;
                document.getElementById('cart-items').innerHTML = `<tr><td colspan="5" style="text-align: center; color: var(--success); padding: 40px;"><i class="fas fa-check-circle" style="font-size: 3rem;"></i><p>تم تحميل ${productsDB.length} منتج.</p></td></tr>`;
            } catch (e) {
                document.getElementById('cart-items').innerHTML = `<tr><td colspan="5" style="text-align: center; color: red;">خطأ في تحميل المنتجات!</td></tr>`;
            }
        }

        const barcodeInput = document.getElementById('barcode-scanner');
        barcodeInput.addEventListener('keypress', e => { if (e.key === 'Enter') scanBarcode(); });

        function scanBarcode() {
            const code = barcodeInput.value.trim();
            if(!code) return;
            const product = productsDB.find(p => p.Barcode == code);
            if (product) {
                const existingItem = cart.find(item => item.Barcode === product.Barcode);
                if (existingItem) existingItem.qty += 1;
                else cart.unshift({ ...product, qty: 1 });
                updateCartUI();
            } else {
                alert("المنتج غير مسجل!");
            }
            barcodeInput.value = '';
            barcodeInput.focus();
        }

        function updateCartUI() {
            const tbody = document.getElementById('cart-items');
            tbody.innerHTML = '';
            let grandTotal = 0;
            cart.forEach((item, index) => {
                const itemTotal = parseFloat(item.Price) * item.qty;
                grandTotal += itemTotal;
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight: 700;">${item.Name}</td>
                        <td>${item.Price}</td>
                        <td>
                            <button class="qty-btn" onclick="cart[${index}].qty++; updateCartUI()">+</button>
                            <span style="margin: 0 10px;">${item.qty}</span>
                            <button class="qty-btn" onclick="cart[${index}].qty--; if(cart[${index}].qty<=0) cart.splice(${index},1); updateCartUI()">-</button>
                        </td>
                        <td style="color: var(--primary); font-weight: bold;">${itemTotal.toFixed(2)}</td>
                        <td><button class="qty-btn" style="color: red;" onclick="cart.splice(${index}, 1); updateCartUI()"><i class="fas fa-trash"></i></button></td>
                    </tr>`;
            });
            document.getElementById('grand-total').innerText = grandTotal.toFixed(2);
            calculateChange();
        }

        function calculateChange() {
            let grandTotal = cart.reduce((sum, item) => sum + (parseFloat(item.Price) * item.qty), 0);
            const paid = parseFloat(document.getElementById('amount-paid').value) || 0;
            const changeDisplay = document.getElementById('amount-change');
            if(paid >= grandTotal && cart.length > 0) {
                changeDisplay.innerText = (paid - grandTotal).toFixed(2) + ' ج.م';
                changeDisplay.style.color = 'var(--success)';
            } else {
                changeDisplay.innerText = '0.00 ج.م';
                changeDisplay.style.color = 'var(--danger)';
            }
        }

        async function processPayment() {
            if (cart.length === 0) return alert("الفاتورة فارغة!");
            let grandTotal = cart.reduce((sum, item) => sum + (parseFloat(item.Price) * item.qty), 0);
            const paid = parseFloat(document.getElementById('amount-paid').value) || 0;
            if (paid < grandTotal) return alert("المبلغ المدفوع غير كافٍ!");

            const invoiceData = { action: 'saveSale', invoice_id: 'INV-' + Date.now(), cashier_id: 'أحمد', items: cart, total: grandTotal, paid: paid, change: paid - grandTotal };
            const btn = document.querySelector('.btn-pay[onclick="processPayment()"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';
            
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(invoiceData) });
                alert("تم إصدار الفاتورة!");
                cart = []; document.getElementById('amount-paid').value = ''; updateCartUI();
            } catch(e) { alert("تم الحفظ محلياً لعدم وجود إنترنت."); }
            
            btn.innerHTML = '<i class="fas fa-print"></i> إصدار الفاتورة';
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
