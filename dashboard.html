<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة الشكاوى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --light: #f8fafc;
            --dark: #1e293b;
            --gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f1f5f9;
            color: var(--dark);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* الهيدر */
        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .stat-label {
            font-size: 1.1rem;
            color: var(--gray);
        }

        /* أدوات التحكم */
        .controls {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-box {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            min-width: 300px;
        }

        .filter-select {
            padding: 12px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        /* كروت الشكاوى */
        .complaints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .complaint-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            border-top: 4px solid var(--primary);
        }

        .complaint-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            padding: 20px;
            background: #f8fafc;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .complaint-id {
            font-weight: 700;
            color: var(--dark);
            font-size: 1.1rem;
            background: #e3f2fd;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-resolved {
            background: #d4edda;
            color: #155724;
        }

        .card-body {
            padding: 20px;
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
            align-items: flex-start;
        }

        .info-row i {
            color: var(--primary);
            width: 25px;
            margin-left: 10px;
            margin-top: 3px;
        }

        .info-label {
            font-weight: 600;
            color: #555;
            min-width: 100px;
        }

        .info-value {
            color: #333;
            flex: 1;
        }

        .card-footer {
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .view-file-btn {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .view-file-btn:hover {
            background: var(--primary);
            color: white;
        }

        /* التحميل */
        .loading {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1 / -1;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* الفوتر */
        .footer {
            text-align: center;
            margin-top: 50px;
            color: var(--gray);
            font-size: 0.95rem;
            padding-top: 25px;
            border-top: 1px solid #e9ecef;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .complaints-grid {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-box {
                min-width: auto;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- الهيدر -->
        <div class="header">
            <h1>
                <i class="fas fa-tachometer-alt"></i>
                لوحة متابعة الشكاوى
            </h1>
            <p>عرض وإدارة جميع الشكاوى المسجلة في النظام</p>
            
            <div class="header-actions">
                <a href="form.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i> إضافة شكوى جديدة
                </a>
                <div>
                    <button id="refreshBtn" class="btn btn-success">
                        <i class="fas fa-sync-alt"></i> تحديث البيانات
                    </button>
                </div>
            </div>
        </div>

        <!-- الإحصائيات -->
        <div class="stats-grid" id="statsContainer">
            <div class="stat-card">
                <div class="stat-number" id="totalComplaints">0</div>
                <div class="stat-label">إجمالي الشكاوى</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingComplaints">0</div>
                <div class="stat-label">قيد المراجعة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="resolvedComplaints">0</div>
                <div class="stat-label">تمت المعالجة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="withFiles">0</div>
                <div class="stat-label">بها مرفقات</div>
            </div>
        </div>

        <!-- أدوات التحكم -->
        <div class="controls">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 ابحث في الشكاوى">
            <select id="filterStatus" class="filter-select">
                <option value="">جميع الحالات</option>
                <option value="قيد المراجعة">قيد المراجعة</option>
                <option value="تمت المعالجة">تمت المعالجة</option>
            </select>
            <button id="exportBtn" class="btn">
                <i class="fas fa-download"></i> تصدير البيانات
            </button>
        </div>

        <!-- حالة التحميل -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>جاري تحميل قائمة الشكاوى...</p>
        </div>

        <!-- كروت الشكاوى -->
        <div id="complaintsContainer" class="complaints-grid">
            <!-- سيتم ملء هذا القسم بالبيانات -->
        </div>

        <!-- الفوتر -->
        <div class="footer">
            <p>© 2024 نظام إدارة الشكاوى</p>
            <p style="margin-top: 10px;">
                <a href="form.html" style="color: var(--primary); text-decoration: none;">نموذج الشكاوى</a>
            </p>
        </div>
    </div>

    <script>
        // 🔥 رابط Google Apps Script - نفس رابط النموذج
        const DASHBOARD_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz_PQwaNaLLTOsU1viKdU0UGH4iwu3SdR8elOzy8LGmpJgtbMy-UKNq6XeD71PIR4022g/exec';
        let allComplaints = [];

        // 🔥 دالة جلب البيانات مع إصلاح CORS
        async function fetchComplaints() {
            const loadingEl = document.getElementById('loading');
            const containerEl = document.getElementById('complaintsContainer');
            
            loadingEl.style.display = 'block';
            containerEl.innerHTML = '';
            
            try {
                console.log('🔄 جاري جلب البيانات...');
                
                // 🔥 الحل: استخدم fetch مع mode: 'no-cors' إذا لزم الأمر
                let response;
                try {
                    response = await fetch(DASHBOARD_SCRIPT_URL, {
                        method: 'GET',
                        mode: 'cors'
                    });
                } catch (error) {
                    console.log('⚠️ محاولة طريقة بديلة...');
                    response = await fetch(DASHBOARD_SCRIPT_URL, {
                        method: 'GET',
                        mode: 'no-cors'
                    });
                }
                
                console.log('📡 حالة الاستجابة:', response.status);
                
                let result;
                if (response.status === 0 && response.type === 'opaque') {
                    // إذا كان no-cors، أظهر رسالة
                    containerEl.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                            <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #f59e0b; margin-bottom: 20px;"></i>
                            <h3>لا يمكن الاتصال بالخادم</h3>
                            <p>يرجى التحقق من نشر Google Apps Script</p>
                            <p style="margin-top: 10px; color: #64748b;">الرابط: ${DASHBOARD_SCRIPT_URL}</p>
                        </div>
                    `;
                    loadingEl.style.display = 'none';
                    return;
                }
                
                result = await response.json();
                console.log('✅ تم جلب البيانات:', result.data?.length || 0, 'شكوى');
                
                if (result.success) {
                    allComplaints = result.data || [];
                    updateStatistics(allComplaints);
                    renderComplaints(allComplaints);
                } else {
                    throw new Error(result.message || 'فشل في جلب البيانات');
                }
                
            } catch (error) {
                console.error('❌ خطأ في جلب البيانات:', error);
                
                containerEl.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 40px; background: #fef2f2; color: #dc2626; border-radius: 10px;">
                        <i class="fas fa-exclamation-circle"></i>
                        <h3>خطأ في تحميل البيانات</h3>
                        <p>${error.message}</p>
                        <button onclick="fetchComplaints()" class="btn" style="margin-top: 15px; background: #dc2626; color: white;">
                            <i class="fas fa-redo"></i> إعادة المحاولة
                        </button>
                    </div>
                `;
            } finally {
                loadingEl.style.display = 'none';
            }
        }

        // تحديث الإحصائيات
        function updateStatistics(complaints) {
            const total = complaints.length;
            const pending = complaints.filter(c => 
                (c.الحالة && c.الحالة.includes('قيد')) || 
                (c.status && c.status.includes('قيد'))
            ).length;
            const resolved = complaints.filter(c => 
                (c.الحالة && c.الحالة.includes('تمت')) || 
                (c.status && c.status.includes('تمت'))
            ).length;
            const withFiles = complaints.filter(c => 
                (c['رابط الملف'] && c['رابط الملف'] !== '') ||
                (c.fileUrl && c.fileUrl !== '')
            ).length;
            
            document.getElementById('totalComplaints').textContent = total;
            document.getElementById('pendingComplaints').textContent = pending;
            document.getElementById('resolvedComplaints').textContent = resolved;
            document.getElementById('withFiles').textContent = withFiles;
        }

        // عرض الشكاوى في كروت
        function renderComplaints(complaints) {
            const container = document.getElementById('complaintsContainer');
            container.innerHTML = '';
            
            // ترتيب من الأحدث إلى الأقدم
            complaints.sort((a, b) => {
                const dateA = new Date(a['الطابع الزمني'] || a.timestamp || 0);
                const dateB = new Date(b['الطابع الزمني'] || b.timestamp || 0);
                return dateB - dateA;
            });
            
            if (complaints.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 60px; color: #64748b;">
                        <i class="fas fa-inbox" style="font-size: 4rem; margin-bottom: 20px; opacity: 0.5;"></i>
                        <h3>لا توجد شكاوى لعرضها</h3>
                        <p>لم يتم تسجيل أي شكاوى حتى الآن</p>
                        <a href="form.html" class="btn btn-primary" style="margin-top: 20px;">
                            <i class="fas fa-plus"></i> أضف أول شكوى
                        </a>
                    </div>
                `;
                return;
            }
            
            complaints.forEach(complaint => {
                const status = complaint.الحالة || complaint.status || 'قيد المراجعة';
                const statusClass = status.includes('تمت') ? 'status-resolved' : 'status-pending';
                const fileUrl = complaint['رابط الملف'] || complaint.fileUrl || '';
                
                const card = document.createElement('div');
                card.className = 'complaint-card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="complaint-id">${complaint['رقم الشكوى'] || complaint.complaintId || 'N/A'}</span>
                        <span class="status ${statusClass}">${status}</span>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <i class="fas fa-user"></i>
                            <span class="info-label">الاسم:</span>
                            <span class="info-value">${complaint.الاسم || complaint.name || 'غير معروف'}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-phone"></i>
                            <span class="info-label">الهاتف:</span>
                            <span class="info-value">${complaint.الهاتف || complaint.phone || 'غير معروف'}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-tag"></i>
                            <span class="info-label">النوع:</span>
                            <span class="info-value">${complaint['نوع الشكوى'] || complaint.complaintType || 'غير محدد'}</span>
                        </div>
                        <div class="info-row">
                            <i class="fas fa-comment"></i>
                            <span class="info-label">التفاصيل:</span>
                            <span class="info-value">${(complaint.التفاصيل || complaint.complaintDetails || 'لا توجد تفاصيل').substring(0, 100)}...</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${fileUrl ? 
                            `<a href="${fileUrl}" target="_blank" class="view-file-btn">
                                <i class="fas fa-paperclip"></i> عرض المرفق
                            </a>` : 
                            '<span style="color: #999; font-size: 0.9rem;">لا يوجد مرفق</span>'
                        }
                        <span style="color: #888; font-size: 0.9rem;">${formatDate(complaint['الطابع الزمني'] || complaint.timestamp)}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // تنسيق التاريخ
        function formatDate(dateString) {
            if (!dateString) return 'غير محدد';
            
            try {
                const date = new Date(dateString);
                return date.toLocaleDateString('ar-EG', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } catch (error) {
                return dateString;
            }
        }

        // البحث والتصفية
        function filterComplaints() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('filterStatus').value;
            
            let filtered = allComplaints;
            
            // التصفية بالنص
            if (searchTerm) {
                filtered = filtered.filter(complaint => {
                    const searchFields = [
                        complaint.الاسم,
                        complaint.name,
                        complaint.الهاتف,
                        complaint.phone,
                        complaint['رقم الشكوى'],
                        complaint.complaintId
                    ];
                    
                    return searchFields.some(field => 
                        field && field.toString().toLowerCase().includes(searchTerm)
                    );
                });
            }
            
            // التصفية بالحالة
            if (filterStatus) {
                filtered = filtered.filter(complaint => {
                    const status = complaint.الحالة || complaint.status || '';
                    return status.includes(filterStatus);
                });
            }
            
            renderComplaints(filtered);
        }

        // أحداث التحكم
        document.getElementById('refreshBtn').addEventListener('click', fetchComplaints);
        document.getElementById('searchInput').addEventListener('input', filterComplaints);
        document.getElementById('filterStatus').addEventListener('change', filterComplaints);

        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', fetchComplaints);
    </script>
</body>
</html>
