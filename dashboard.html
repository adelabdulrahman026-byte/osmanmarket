<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>OSSMAN MARKET - إدارة النظام</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --bg-dark: #1E1E2D; --primary: #3699FF; --success: #1BC5BD; --danger: #F64E60; --bg-light: #F3F6F9; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
        body { display:flex; height:100vh; background:var(--bg-light); }
        .sidebar { width:250px; background:var(--bg-dark); color:white; }
        .nav-menu { list-style:none; padding:20px; }
        .nav-menu li { padding:15px; cursor:pointer; border-radius:10px; margin-bottom:10px; }
        .nav-menu li:hover { background:rgba(255,255,255,0.1); color:var(--primary); }
        .workspace { flex:1; padding:20px; overflow-y:auto; }
        .card { background:white; padding:20px; border-radius:15px; margin-bottom:20px; box-shadow:0 2px 5px rgba(0,0,0,0.05); }
        table { width:100%; border-collapse:collapse; }
        th, td { padding:15px; border-bottom:1px solid #eee; text-align:right; }
        .btn { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; color:white; font-weight:bold; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div style="padding:20px; text-align:center; font-size:1.5rem; font-weight:900;">OSSMAN</div>
    <ul class="nav-menu">
        <li onclick="showPage('pos')"><i class="fas fa-desktop"></i> الكاشير</li>
        <li onclick="showPage('return')"><i class="fas fa-undo"></i> المرتجعات</li>
        <li onclick="showPage('inventory')"><i class="fas fa-boxes"></i> المخزن</li>
        <li onclick="showPage('reports')"><i class="fas fa-chart-line"></i> التقارير</li>
    </ul>
</aside>

<div class="workspace">
    <!-- صفحة الكاشير -->
    <div id="pos" class="page">
        <div class="card">
            <input type="text" id="barcode" placeholder="الباركود..." style="padding:15px; width:100%; font-size:1.2rem;">
        </div>
        <div class="card">
            <table id="cart-table">
                <thead><tr><th>المنتج</th><th>السعر</th><th>الكمية</th><th>حذف</th></tr></thead>
                <tbody id="cart-body"></tbody>
            </table>
            <button class="btn" style="background:var(--success); width:100%; margin-top:20px;" onclick="process('sale')">إصدار الفاتورة</button>
        </div>
    </div>

    <!-- صفحة المخزن -->
    <div id="inventory" class="page" style="display:none;">
        <div class="card">
            <button class="btn" style="background:var(--primary);" onclick="exportExcel()">تصدير إكسيل</button>
            <table id="inv-table">
                <thead><tr><th>الباركود</th><th>الاسم</th><th>السعر</th><th>الكمية</th><th>تعديل</th></tr></thead>
                <tbody id="inv-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwj1ryy6kcPkQSleuKmET6tLefgSkzRz1NqSX4B4jsgaZfn2yei0gwD6oAfcZT5s_Dp7w/exec";
    let productsDB = [], cart = [];

    async function loadData() {
        const res = await fetch(API_URL);
        productsDB = await res.json();
        renderInventory();
    }

    function renderInventory() {
        const body = document.getElementById('inv-body');
        body.innerHTML = productsDB.map((p, i) => `
            <tr>
                <td>${p.Barcode}</td><td>${p.Name}</td><td>${p.Price}</td>
                <td><input type="number" value="${p.Stock}" onchange="updateStock(${i}, this.value)"></td>
                <td><button class="btn" style="background:var(--primary);" onclick="editProd(${i})">تعديل</button></td>
            </tr>
        `).join('');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    function exportExcel() {
        const wb = XLSX.utils.table_to_book(document.getElementById('inv-table'));
        XLSX.writeFile(wb, "Inventory.xlsx");
    }

    function updateStock(index, val) { productsDB[index].Stock = val; }

    // تشغيل التحميل
    window.onload = loadData;
</script>
</body>
</html>
