<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة الشكاوى</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f8f9fa; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 40px; }
        h1 { color: #2c3e50; font-size: 2.8rem; margin-bottom: 10px; }
        
        .controls { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; display: flex; gap: 15px; flex-wrap: wrap; }
        .search { flex: 1; padding: 12px 20px; border: 2px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .filter, .btn { padding: 12px 20px; border: 2px solid #3498db; border-radius: 10px; background: #3498db; color: white; cursor: pointer; }
        .btn:hover { background: #2980b9; }
        
        .stats { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { flex: 1; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; min-width: 200px; }
        .stat-number { font-size: 2.5rem; font-weight: bold; color: #2c3e50; }
        .stat-label { color: #7f8c8d; margin-top: 10px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border-top: 4px solid #3498db; }
        .card-header { padding: 20px; background: #f8fafc; display: flex; justify-content: space-between; align-items: center; }
        .card-id { font-weight: bold; color: #2c3e50; background: #e3f2fd; padding: 5px 15px; border-radius: 20px; }
        .card-status { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-done { background: #d4edda; color: #155724; }
        
        .card-body { padding: 20px; }
        .info { display: flex; margin-bottom: 15px; }
        .info i { color: #3498db; width: 25px; margin-left: 10px; }
        .label { font-weight: 600; color: #555; min-width: 100px; }
        .value { color: #333; }
        
        .card-footer { padding: 15px 20px; background: #f9f9f9; border-top: 1px solid #eee; display: flex; justify-content: space-between; }
        .file-btn { background: transparent; color: #3498db; border: 1px solid #3498db; padding: 8px 15px; border-radius: 8px; text-decoration: none; }
        .file-btn:hover { background: #3498db; color: white; }
        
        .loading { text-align: center; padding: 60px; grid-column: 1 / -1; }
        .spinner { border: 5px solid #f3f3f3; border-top: 5px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-tachometer-alt"></i> لوحة متابعة الشكاوى</h1>
            <p>عرض وإدارة جميع الشكاوى المسجلة</p>
            <div style="margin-top: 20px;">
                <a href="form.html" style="background: #2c3e50; color: white; padding: 12px 30px; border-radius: 10px; text-decoration: none; display: inline-block;">
                    <i class="fas fa-plus"></i> إضافة شكوى جديدة
                </a>
            </div>
        </div>
        
        <div class="stats" id="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalComplaints">0</div>
                <div class="stat-label">إجمالي الشكاوى</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="pendingComplaints">0</div>
                <div class="stat-label">قيد المراجعة</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="resolvedComplaints">0</div>
                <div class="stat-label">تمت معالجتها</div>
            </div>
        </div>
        
        <div class="controls">
            <input type="text" id="searchInput" class="search" placeholder="🔍 ابحث في الشكاوى...">
            <select id="filterStatus" class="filter">
                <option value="">جميع الحالات</option>
                <option value="قيد المراجعة">قيد المراجعة</option>
                <option value="تمت المعالجة">تمت المعالجة</option>
            </select>
            <button id="refreshBtn" class="btn"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>جاري تحميل الشكاوى...</p>
        </div>
        
        <div id="complaintsContainer" class="grid">
            <!-- الكروت ستظهر هنا -->
        </div>
    </div>

    <script>
        // 🔗 رابط نشر Google Apps Script - نفس رابط النموذج
        const DASHBOARD_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwW5nGVfN41ghksGC3lTYs3RFX7CMTRF4PvktaPFwifS7j0ReDVjr6txJH8IOkB0-_LQw/exec';
        let allComplaints = [];
        
        // جلب البيانات
        async function fetchComplaints() {
            const loadingEl = document.getElementById('loading');
            const containerEl = document.getElementById('complaintsContainer');
            
            loadingEl.style.display = 'block';
            containerEl.innerHTML = '';
            
            try {
                const response = await fetch(DASHBOARD_SCRIPT_URL);
                const result = await response.json();
                
                if (result.success) {
                    allComplaints = result.data;
                    updateStats(allComplaints);
                    renderComplaints(allComplaints);
                }
            } catch (error) {
                containerEl.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: #f8d7da; color: #721c24; border-radius: 10px;">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>خطأ في تحميل البيانات</h3>
                        <p>${error.message}</p>
                        <button onclick="fetchComplaints()" style="margin-top: 15px; padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px;">إعادة المحاولة</button>
                    </div>
                `;
            } finally {
                loadingEl.style.display = 'none';
            }
        }
        
        // تحديث الإحصائيات
        function updateStats(complaints) {
            const total = complaints.length;
            const pending = complaints.filter(c => 
                (c.الحالة && c.الحالة.includes('قيد')) || 
                (c.status && c.status.includes('قيد'))
            ).length;
            const resolved = complaints.filter(c => 
                (c.الحالة && c.الحالة.includes('تمت')) || 
                (c.status && c.status.includes('تمت'))
            ).length;
            
            document.getElementById('totalComplaints').textContent = total;
            document.getElementById('pendingComplaints').textContent = pending;
            document.getElementById('resolvedComplaints').textContent = resolved;
        }
        
        // عرض الشكاوى في كروت
        function renderComplaints(complaints) {
            const container = document.getElementById('complaintsContainer');
            container.innerHTML = '';
            
            complaints.sort((a, b) => new Date(b.الطابع الزمني || b.timestamp) - new Date(a.الطابع الزمني || a.timestamp));
            
            complaints.forEach(complaint => {
                const statusClass = (complaint.الحالة && complaint.الحالة.includes('تمت')) ? 'status-done' : 'status-pending';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-id">${complaint['رقم الشكوى'] || complaint.complaintId || 'N/A'}</span>
                        <span class="card-status ${statusClass}">${complaint.الحالة || complaint.status || 'قيد المراجعة'}</span>
                    </div>
                    <div class="card-body">
                        <div class="info">
                            <i class="fas fa-user"></i>
                            <span class="label">الاسم:</span>
                            <span class="value">${complaint.الاسم || complaint.name || 'غير معروف'}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-phone"></i>
                            <span class="label">الهاتف:</span>
                            <span class="value">${complaint.الهاتف || complaint.phone || 'غير معروف'}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-tag"></i>
                            <span class="label">النوع:</span>
                            <span class="value">${complaint['نوع الشكوى'] || complaint.complaintType || 'غير محدد'}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-comment"></i>
                            <span class="label">التفاصيل:</span>
                            <span class="value">${(complaint.التفاصيل || complaint.complaintDetails || 'لا توجد تفاصيل').substring(0, 80)}...</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-calendar"></i>
                            <span class="label">التاريخ:</span>
                            <span class="value">${formatDate(complaint['الطابع الزمني'] || complaint.timestamp)}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        ${complaint['رابط الملف'] || complaint.fileUrl ? 
                            `<a href="${complaint['رابط الملف'] || complaint.fileUrl}" target="_blank" class="file-btn">
                                <i class="fas fa-paperclip"></i> عرض الملف
                            </a>` : 
                            '<span style="color: #999;">لا يوجد مرفق</span>'
                        }
                        <span style="color: #888; font-size: 0.9rem;">${formatDate(complaint['الطابع الزمني'] || complaint.timestamp)}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }
        
        // تنسيق التاريخ
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            return date.toLocaleDateString('ar-EG', {
                year: 'numeric', month: 'long', day: 'numeric'
            });
        }
        
        // البحث والتصفية
        function filterComplaints() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filterStatus = document.getElementById('filterStatus').value;
            
            let filtered = allComplaints;
            
            if (searchTerm) {
                filtered = filtered.filter(complaint => 
                    (complaint.الاسم && complaint.الاسم.toLowerCase().includes(searchTerm)) ||
                    (complaint.name && complaint.name.toLowerCase().includes(searchTerm)) ||
                    (complaint.الهاتف && complaint.الهاتف.includes(searchTerm)) ||
                    (complaint.phone && complaint.phone.includes(searchTerm)) ||
                    (complaint['رقم الشكوى'] && complaint['رقم الشكوى'].toLowerCase().includes(searchTerm)) ||
                    (complaint.complaintId && complaint.complaintId.toLowerCase().includes(searchTerm))
                );
            }
            
            if (filterStatus) {
                filtered = filtered.filter(complaint => 
                    (complaint.الحالة && complaint.الحالة.includes(filterStatus)) ||
                    (complaint.status && complaint.status.includes(filterStatus))
                );
            }
            
            renderComplaints(filtered);
        }
        
        // أحداث
        document.getElementById('refreshBtn').addEventListener('click', fetchComplaints);
        document.getElementById('searchInput').addEventListener('input', filterComplaints);
        document.getElementById('filterStatus').addEventListener('change', filterComplaints);
        
        // تحميل البيانات عند فتح الصفحة
        document.addEventListener('DOMContentLoaded', fetchComplaints);
    </script>
</body>
</html>
