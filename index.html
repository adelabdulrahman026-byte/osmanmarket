<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إمبراطورية التوفير - متجر العميل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .payment-option:checked + label { border-color: #2563eb; background-color: #eff6ff; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' } } } } }
    </script>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <header class="bg-white shadow-sm sticky top-0 z-50 border-b border-slate-200">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://adelabdulrahman026-byte.github.io/dashboard/Gemini_Generated_Image_2whe032whe032whe.png" alt="Logo" class="h-10 w-10 md:h-12 md:w-12 rounded-xl object-cover border border-brand-100">
                <span class="font-black text-lg md:text-xl text-brand-700">إمبراطورية التوفير</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openCheckoutModal()" class="relative p-2 text-slate-600 hover:text-brand-600 transition">
                    <i class="fa-solid fa-cart-shopping text-2xl"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-brand-600 text-white text-[11px] font-bold h-5 w-5 rounded-full flex items-center justify-center shadow">0</span>
                </button>
                <button class="hidden md:flex items-center gap-2 bg-brand-50 text-brand-700 px-4 py-2 rounded-lg font-bold hover:bg-brand-100 transition">
                    <i class="fa-regular fa-user"></i> حسابي
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8 space-y-8">
        
        <div class="relative w-full h-48 md:h-80 rounded-3xl overflow-hidden shadow-xl border-4 border-white">
            <div id="hero-slider" class="absolute inset-0 bg-gradient-to-r from-brand-600 to-blue-900 flex items-center p-6 md:p-16 text-white transition-all duration-500">
                <div class="max-w-lg z-10">
                    <span class="bg-white text-brand-700 px-3 py-1 rounded-full text-xs font-black shadow-md">عروض حصرية</span>
                    <h3 class="text-2xl md:text-4xl font-black mt-2">تسوق أحدث المنتجات 🛒</h3>
                </div>
            </div>
        </div>

        <div>
            <h2 class="text-xl font-bold mb-4 text-brand-700 border-r-4 border-brand-600 pr-3">منتجات السوبر ماركت</h2>
            <div id="storefrontGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4">
                <p class="text-slate-500 col-span-full text-center py-10">جاري تحميل المنتجات من السيرفر...</p>
            </div>
        </div>
    </main>

    <div id="checkoutModal" class="fixed inset-0 bg-slate-900/50 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden relative">
            <div class="p-4 border-b flex justify-between bg-slate-50">
                <h3 class="font-black text-brand-700">إتمام الطلب</h3>
                <button onclick="document.getElementById('checkoutModal').classList.add('hidden')" class="text-rose-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div class="relative">
                    <input type="radio" name="payMethod" id="payCash" value="cash" class="payment-option peer sr-only" checked onchange="document.getElementById('visaForm').classList.add('hidden')">
                    <label for="payCash" class="flex items-center gap-4 p-4 border-2 rounded-xl cursor-pointer hover:bg-slate-50"><i class="fa-solid fa-money-bill text-emerald-500 text-2xl"></i> الدفع نقداً عند الاستلام</label>
                </div>
                <div class="relative">
                    <input type="radio" name="payMethod" id="payVisa" value="visa" class="payment-option peer sr-only" onchange="document.getElementById('visaForm').classList.remove('hidden')">
                    <label for="payVisa" class="flex items-center gap-4 p-4 border-2 rounded-xl cursor-pointer hover:bg-slate-50"><i class="fa-brands fa-cc-visa text-blue-600 text-2xl"></i> الدفع بالفيزا</label>
                </div>
                
                <div id="visaForm" class="hidden space-y-2 pt-2">
                    <input type="text" placeholder="رقم البطاقة" class="w-full border rounded-lg p-2 font-mono">
                    <div class="flex gap-2">
                        <input type="text" placeholder="MM/YY" class="w-1/2 border rounded-lg p-2 font-mono text-center">
                        <input type="text" placeholder="CVV" class="w-1/2 border rounded-lg p-2 font-mono text-center">
                    </div>
                </div>
                <button onclick="confirmClientOrder()" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-black py-3 rounded-xl shadow-lg">تأكيد الأوردر</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    
    <script>
        // دالة لعرض المنتجات بعد ما app.js يجيبها من جوجل شيت
        async function loadClientProducts() {
            if(typeof fetchProducts === 'function') {
                let products = await fetchProducts();
                let grid = document.getElementById('storefrontGrid');
                grid.innerHTML = '';
                if(products.length === 0) grid.innerHTML = '<p class="col-span-full text-center">لا توجد منتجات حالياً.</p>';
                
                products.forEach(p => {
                    grid.innerHTML += `
                        <div class="bg-white rounded-2xl p-3 shadow-sm border border-slate-100 flex flex-col">
                            <div class="rounded-xl overflow-hidden bg-slate-50 aspect-square mb-2">
                                <img src="${p.image || 'https://via.placeholder.com/150'}" alt="${p.name}" class="w-full h-full object-cover">
                            </div>
                            <h4 class="text-sm font-bold text-slate-800 mb-1 line-clamp-2">${p.name}</h4>
                            <div class="flex items-center justify-between mt-auto pt-2 border-t border-slate-100">
                                <span class="text-base font-black text-brand-600">${p.price} ج.م</span>
                                <button onclick="addToCart()" class="h-8 w-8 bg-brand-50 hover:bg-brand-600 hover:text-white text-brand-600 rounded-lg flex items-center justify-center transition"><i class="fa-solid fa-plus"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
        }

        let cartTotal = 0;
        function addToCart() {
            cartTotal++;
            document.getElementById('cartCount').innerText = cartTotal;
        }

        function openCheckoutModal() {
            document.getElementById('checkoutModal').classList.remove('hidden');
            document.getElementById('checkoutModal').classList.add('flex');
        }

        function confirmClientOrder() {
            alert('تم استلام الأوردر بنجاح! سيتم إرساله لسيستم الكاشير والمخزن.');
            document.getElementById('checkoutModal').classList.add('hidden');
            cartTotal = 0;
            document.getElementById('cartCount').innerText = cartTotal;
        }

        // تشغيل دوال الصفحة بعد التحميل
        window.addEventListener('DOMContentLoaded', loadClientProducts);
    </script>
</body>
</html>
