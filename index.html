<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القاضي في التاريخ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Cairo,sans-serif}
body{background:#0b0f19;color:#fff;overflow-x:hidden}
.splash{position:fixed;inset:0;background:#000;z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;animation:hide 6s forwards}
.splash img{width:90%;max-width:420px;border-radius:30px;box-shadow:0 0 40px gold;animation:zoom 4s ease}
.splash h1{margin-top:20px;color:gold;font-size:2rem;opacity:0;animation:text 2s 1.5s forwards}
@keyframes zoom{from{transform:scale(1.3);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes text{to{opacity:1;letter-spacing:2px}}
@keyframes hide{0%,85%{opacity:1;visibility:visible}100%{opacity:0;visibility:hidden}}

.menu-btn{position:fixed;top:20px;right:20px;width:55px;height:55px;border-radius:50%;background:gold;color:#000;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;z-index:1000}
.sidebar{position:fixed;right:-300px;top:0;width:280px;height:100%;background:#111827;transition:.6s;padding-top:90px;z-index:999}
.sidebar.active{right:0}
.sidebar a{display:block;padding:18px;color:#fff;text-decoration:none;border-bottom:1px solid #333}
.hero{min-height:100vh;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.85)),url('https://adelabdulrahman026-byte.github.io/dashboard/ChatGPT%20Image%20Jun%202,%202026,%2005_32_20%20AM.png') center/cover;display:flex;align-items:center;justify-content:center;text-align:center}
.hero h1{font-size:3rem;color:gold;text-shadow:0 0 20px gold}
.hero p{font-size:1.2rem;margin-top:10px}
.slider{margin:20px auto;width:95%;overflow:hidden;border-radius:25px}
.track{display:flex;width:400%;animation:slide 16s infinite}
.track img{width:100%;height:230px;object-fit:cover}
@keyframes slide{0%,20%{transform:translateX(0)}25%,45%{transform:translateX(-100%)}50%,70%{transform:translateX(-200%)}75%,95%{transform:translateX(-300%)}100%{transform:translateX(0)}}
.buttons{padding:20px;display:flex;flex-direction:column;gap:15px}
.btn{padding:18px;border:none;border-radius:20px;background:linear-gradient(45deg,#d4af37,#ffd700);font-size:22px;font-weight:bold;cursor:pointer}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);align-items:center;justify-content:center;z-index:2000}
.box{width:90%;max-width:380px;background:#161b22;padding:25px;border-radius:20px}
.box h2{color:gold;margin-bottom:15px}
.box input{width:100%;padding:14px;margin:8px 0;border:none;border-radius:12px}
.box button{width:100%;padding:14px;border:none;border-radius:12px;background:gold}
.footer{text-align:center;padding:30px;color:#aaa}
</style>
</head>
<body>

<div class="splash">
<img src="https://adelabdulrahman026-byte.github.io/dashboard/ChatGPT%20Image%20Jun%202,%202026,%2005_32_20%20AM.png">
<h1>👑 مرحباً بك في عالم القاضي في التاريخ</h1>
</div>

<div class="menu-btn" onclick="sidebar.classList.toggle('active')">☰</div>

<div class="sidebar" id="sidebar">
<a href="#" onclick="coming()">🏠 الرئيسية</a>
<a href="#" onclick="coming()">🎥 المحاضرات</a>
<a href="#" onclick="coming()">📝 الواجبات</a>
<a href="#" onclick="coming()">📊 النتائج</a>
<a href="#" onclick="coming()">📞 تواصل معنا</a>
</div>

<section class="hero">
<div>
<h1>⚔️ القاضي في التاريخ ⚔️</h1>
<p>منصة تعليمية حديثة لمادة التاريخ</p>
</div>
</section>

<div class="slider">
<div class="track">
<img src="https://images.unsplash.com/photo-1516483638261-f4dbaf036963">
<img src="https://images.unsplash.com/photo-1564507592333-c60657eea523">
<img src="https://images.unsplash.com/photo-1549897164-0a3b1d6d2db5">
<img src="https://images.unsplash.com/photo-1539650116574-75c0c6d73f6e">
</div>
</div>

<div class="buttons">
<button class="btn" onclick="student.style.display='flex'">🎓 دخول الطالب</button>
<button class="btn" onclick="parentm.style.display='flex'">👨‍👩‍👦 ولي الأمر</button>
</div>

<div class="footer">🏛️ المنصة قيد التطوير</div>

<div class="modal" id="student">
<div class="box">
<h2>تسجيل دخول الطالب</h2>
<input placeholder="اسم الطالب">
<input placeholder="كلمة المرور" type="password">
<button onclick="coming()">دخول</button>
</div>
</div>

<div class="modal" id="parentm">
<div class="box">
<h2>كود الطالب</h2>
<input placeholder="ادخل كود الطالب">
<button onclick="coming()">متابعة</button>
</div>
</div>

<script>
function coming(){
alert("🚀 جاري الانتهاء من المنصة قريباً\\n❤️ انتظرونا");
}
window.onclick=function(e){
if(e.target==student) student.style.display='none';
if(e.target==parentm) parentm.style.display='none';
}
</script>

</body>
</html>
