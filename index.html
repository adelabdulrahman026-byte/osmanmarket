<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSSMAN MARKET - عثمان ماركت</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #E63946; --secondary: #1D3557; --bg-main: #F4F6F8; --bg-card: #FFFFFF;
            --text-dark: #111111; --text-muted: #6C757D; --border: #E5E7EB;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04); --shadow-md: 0 10px 20px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        [data-theme="dark"] {
            --primary: #FF4D5A; --secondary: #457B9D; --bg-main: #0F172A; --bg-card: #1E293B;
            --text-dark: #F8FAFC; --text-muted: #94A3B8; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); transition: background-color 0.4s, color 0.4s; }

        /* Auth Overlays */
        .auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: var(--bg-card); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; box-shadow: var(--shadow-md); }
        .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; font-weight: bold; color: var(--text-muted); }
        .auth-tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .auth-btn-social { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg-main); font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        .top-utility-bar { background-color: var(--bg-card); border-bottom: 1px solid var(--border); padding: 8px 5%; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; color: var(--text-muted); }
        .utility-links { display: flex; gap: 20px; align-items: center; }
        .main-header { background-color: var(--bg-card); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 1000; }
        .brand-logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .brand-logo img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }
        .brand-title { font-size: 1.8rem; font-weight: 900; color: var(--secondary); line-height: 1; }
        .brand-title span { color: var(--primary); }

        .search-wrapper { flex: 0 1 500px; position: relative; }
        .search-wrapper input { width: 100%; background-color: var(--bg-main); border: 2px solid transparent; padding: 15px 25px 15px 50px; border-radius: 30px; font-size: 1rem; color: var(--text-dark); outline: none; }
        .search-btn { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); font-size: 1.2rem; }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .action-icon { position: relative; font-size: 1.5rem; color: var(--secondary); cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background-color: var(--bg-main); border: none; }
        .cart-badge { position: absolute; top: -5px; right: -5px; background-color: var(--primary); color: white; font-size: 12px; font-weight: bold; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg-card); }

        .category-nav { background-color: var(--secondary); padding: 0 5%; overflow-x: auto; white-space: nowrap; }
        .category-nav ul { list-style: none; display: flex; gap: 30px; }
        .category-nav a { color: white; text-decoration: none; font-weight: 700; padding: 15px 0; display: inline-block; }

        .hero-section { margin: 30px 5%; border-radius: 24px; overflow: hidden; position: relative; background: linear-gradient(135deg, var(--secondary) 0%, #2A4B7C 100%); display: flex; align-items: center; min-height: 350px; box-shadow: var(--shadow-md); }
        .hero-content { padding: 50px; color: white; z-index: 2; max-width: 50%; }
        .hero-title { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
        .hero-image { position: absolute; left: 0; bottom: -20px; height: 120%; object-fit: contain; opacity: 0.9; }

        .section-container { padding: 40px 5%; }
        .section-title { font-size: 2rem; font-weight: 900; color: var(--secondary); margin-bottom: 30px; text-align: center; }

        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .product-card { background-color: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; text-align: center; transition: var(--transition); }
        .product-card:hover { border-color: var(--primary); box-shadow: var(--shadow-md); }
        .product-img { width: 100%; height: 160px; object-fit: contain; margin-bottom: 15px; }
        .product-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 10px; }
        .product-price { font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 15px; }
        .btn-add { background-color: var(--bg-main); color: var(--text-dark); border: 1px solid var(--border); width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* سلة المشتريات */
        .cart-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .cart-content { background: var(--bg-card); width: 95%; max-width: 550px; border-radius: 20px; padding: 30px; max-height: 90vh; overflow-y: auto; position: relative; }
        .close-cart { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 1.5rem; color: var(--danger); cursor: pointer; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 10px 0; }
        .cart-form input, .cart-form select { width: 100%; padding: 12px; border: 2px solid var(--border); border-radius: 8px; margin-bottom: 15px; outline: none; font-family: 'Tajawal'; font-weight: bold;}
        
        .pay-method-box { display: flex; gap: 15px; margin-bottom: 15px; }
        .pay-option { flex: 1; padding: 15px; border: 2px solid var(--border); border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; }
        .pay-option.active { border-color: var(--success); background: #EDFBF7; color: #0A7C43; }
    </style>
</head>
<body>

    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <img src="https://adelabdulrahman026-byte.github.io/dashboard/Gemini_Generated_Image_2whe032whe032whe.png" style="width:70px; border-radius:10px; margin-bottom:10px;">
            <div class="auth-tabs">
                <div class="auth-tab active" id="tab-login" onclick="toggleAuthTab('login')">تسجيل الدخول</div>
                <div class="auth-tab" id="tab-register" onclick="toggleAuthTab('register')">إنشاء حساب جديد</div>
            </div>
            
            <div id="social-auth-section">
                <button class="auth-btn-social" onclick="simulateSocialAuth('جوجل')"><i class="fab fa-google" style="color:#EA4335;"></i> الدخول بواسطة حساب Google</button>
                <button class="auth-btn-social" onclick="simulateSocialAuth('فيسبوك')"><i class="fab fa-facebook" style="color:#1877F2;"></i> الدخول بواسطة Facebook</button>
                <div style="margin: 15px 0; color:var(--text-muted); font-weight: bold;">أو عبر البيانات المباشرة</div>
            </div>

            <form id="authForm" onsubmit="handleAuth(event)" class="cart-form">
                <input type="text" id="auth-name" placeholder="الاسم بالكامل (مطلوب لإنشاء الحساب فقط)" style="display:none;">
                <input type="text" id="auth-username" placeholder="رقم الموبايل أو الجيميل" required>
                <input type="password" id="auth-password" placeholder="كلمة المرور" required>
                <button type="submit" class="btn-login" style="width:100%;" id="btn-auth-submit">دخول للمتجر</button>
            </form>
        </div>
    </div>

    <div class="top-utility-bar">
        <div class="utility-links">
            <span><i class="fas fa-user-circle"></i> أهلاً بك: <strong id="welcome-user-name" style="color:var(--primary);">زائر</strong></span>
        </div>
        <div class="utility-links">
            <button class="action-icon" style="width:30px; height:30px; font-size:1rem;" onclick="toggleTheme()"><i class="fas fa-moon"></i></button>
            <button class="lang-btn" onclick="toggleLanguage()"><i class="fas fa-globe"></i> <span id="lang-text">English</span></button>
            <button class="lang-btn" style="border-color:var(--danger); color:var(--danger); display:none;" id="btn-cust-logout" onclick="customerLogout()">خروج</button>
        </div>
    </div>

    <header class="main-header">
        <a href="#" class="brand-logo">
            <img src="https://adelabdulrahman026-byte.github.io/dashboard/Gemini_Generated_Image_2whe032whe032whe.png" alt="Logo">
            <div class="brand-title">OSSMAN <span>MARKET</span></div>
        </a>
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="عن ماذا تبحث اليوم؟" oninput="filterProducts()">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
        <div class="header-actions">
            <button class="action-icon" onclick="openCart()">
                <i class="fas fa-shopping-basket"></i><span class="cart-badge" id="cart-count">0</span>
            </button>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h1 class="hero-title" id="hero-title">نفس الجودة بالسعر اللي تحبه</h1>
        </div>
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=800&auto=format&fit=crop" class="hero-image" style="clip-path: circle(60% at 0% 50%); object-fit: cover;">
    </section>

    <div class="section-container">
        <h2 class="section-title" id="prod-title">منتجات الماركت المتاحة</h2>
        <div class="products-grid" id="products-container">
            <div style="grid-column: 1/-1; text-align: center; padding: 40px;"><i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i></div>
        </div>
    </div>

    <div id="cart-modal" class="cart-modal">
        <div class="cart-content">
            <button class="close-cart" onclick="closeCart()"><i class="fas fa-times"></i></button>
            <h2><i class="fas fa-shopping-cart"></i> سلة مشترياتك</h2>
            <div id="cart-items-list" style="margin-bottom: 20px; max-height:180px; overflow-y:auto;"></div>
            <div style="font-size: 1.4rem; font-weight: 900; color: var(--primary); margin-bottom: 20px;">الإجمالي الصافي: <span id="cart-total-price">0.00</span> ج.م</div>

            <h3 style="margin-bottom:10px;">طريقة الدفع المفضلّة:</h3>
            <div class="pay-method-box">
                <div class="pay-option active" id="pay-cod" onclick="selectPayMethod('COD')"><i class="fas fa-money-bill-wave"></i> كاش عند الاستلام</div>
                <div class="pay-option" id="pay-visa" onclick="selectPayMethod('VISA')"><i class="fas fa-credit-card"></i> بطاقة ائتمان (فيزا)</div>
            </div>

            <div id="visa-form-box" style="display:none; background:var(--bg-main); padding:15px; border-radius:10px; margin-bottom:15px;">
                <h4 style="margin-bottom:10px; color:var(--secondary);">بيانات بطاقة الفيزا</h4>
                <div class="cart-form" style="margin:0;">
                    <input type="text" placeholder="رقم الكارت (16 رقم)" maxlength="16">
                    <div style="display:flex; gap:10px;">
                        <input type="text" placeholder="MM/YY" style="flex:1;">
                        <input type="password" placeholder="CVV" maxlength="3" style="flex:1;">
                    </div>
                </div>
            </div>

            <h3>عنوان شحن الطلب:</h3>
            <form class="cart-form" onsubmit="submitCustomerOrder(event)">
                <input type="text" id="cust-address" placeholder="العنوان بالتفصيل لسهولة التوصيل" required>
                <button type="submit" id="btn-submit-order" class="btn-login" style="width:100%;"><i class="fas fa-paper-plane"></i> إرسال الطلب للتحضير</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx0aJ5nXQBQQrWr9rgZAV5KcQ3oJeWulfCSU4_0ggP7V2dr23zmerCOKpIjtDnYCLCagA/exec";
        let currentLang = 'ar'; let storeProducts = []; let customerCart = [];
        let authMode = 'login'; let activePaymentMethod = 'COD';

        window.navigator.geolocation.getCurrentPosition(() => {}); // لطلب صلاحيات لتهيئة النوافذ

        // تحكم شاشة الدخول والـ Tabs
        function toggleAuthTab(mode) {
            authMode = mode;
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-' + mode).classList.add('active');
            document.getElementById('auth-name').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('btn-auth-submit').innerText = mode === 'register' ? 'إنشاء حساب ودخول' : 'دخول للمتجر';
        }

        function simulateSocialAuth(platform) {
            const simulatedUser = platform === 'جوجل' ? 'boda.market@gmail.com' : '01020304050';
            document.getElementById('auth-username').value = simulatedUser;
            document.getElementById('auth-password').value = '123456';
            alert(`تم ربط حسابك بـ ${platform} بنجاح، اضغط دخول الآن!`);
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-auth-submit');
            btn.innerText = 'جاري المعالجة...';
            
            const payload = {
                action: authMode === 'login' ? 'login' : 'registerCustomer',
                name: document.getElementById('auth-name').value || 'عميل أونلاين',
                username: document.getElementById('auth-username').value,
                password: document.getElementById('auth-password').value
            };

            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            const data = await res.json();

            if (data.status === 'success' || authMode === 'register') {
                const userObj = data.user || { name: payload.name, username: payload.username, role: 'عميل' };
                localStorage.setItem('ossman_customer', JSON.stringify(userObj));
                checkAuthStatus();
                loadMarketProducts();
            } else { alert(data.message || "فشلت العملية!"); }
            btn.innerText = 'دخول للمتجر';
        }

        function checkAuthStatus() {
            const user = localStorage.getItem('ossman_customer');
            if(user) {
                const parsed = JSON.parse(user);
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('welcome-user-name').innerText = parsed.name;
                document.getElementById('btn-cust-logout').style.display = 'inline-block';
            } else { document.getElementById('auth-overlay').style.display = 'flex'; }
        }

        function customerLogout() { localStorage.removeItem('ossman_customer'); location.reload(); }

        async function loadMarketProducts() {
            checkAuthStatus();
            try {
                const response = await fetch(API_URL + "?action=getAllData"); const data = await response.json();
                storeProducts = data.products.slice(1).map(p => ({ Barcode: p[0], Name: p[1], Category: p[2], Cost: p[3], Price: p[4], Stock: p[5] })).filter(p => p.Barcode && p.Stock > 0);
                renderProducts();
            } catch (error) {}
        }
        window.addEventListener('DOMContentLoaded', loadMarketProducts);

        function renderProducts(productsToRender = storeProducts) {
            const container = document.getElementById('products-container');
            if(productsToRender.length === 0) { container.innerHTML = `<p style="grid-column: 1/-1; text-align: center; font-weight:bold;">لا توجد أصناف مطابقة.</p>`; return; }
            container.innerHTML = productsToRender.map(prod => `
                <div class="product-card">
                    <h3 class="product-title">${prod.Name}</h3>
                    <div class="product-price">${prod.Price} ج.م</div>
                    <button class="btn-add" onclick="addToCart('${prod.Barcode}', this)"><i class="fas fa-cart-plus"></i> ${currentLang === 'ar' ? 'أضف للسلة' : 'Add to Cart'}</button>
                </div>`).join('');
        }

        function filterProducts() {
            const query = document.getElementById('search-input').value.toLowerCase();
            renderProducts(storeProducts.filter(p => p.Name.toLowerCase().includes(query)));
        }

        function addToCart(barcode, btn) {
            const product = storeProducts.find(p => p.Barcode == barcode); if(!product) return;
            const existing = customerCart.find(i => i.Barcode === product.Barcode);
            if(existing) { if(existing.qty >= product.Stock) return alert("نفذت الكمية بالمخزن!"); existing.qty += 1; } 
            else { customerCart.push({...product, qty: 1}); }
            document.getElementById('cart-count').innerText = customerCart.reduce((sum, item) => sum + item.qty, 0);
            btn.innerHTML = `<i class="fas fa-check"></i> تم`; setTimeout(() => { btn.innerHTML = `<i class="fas fa-cart-plus"></i> أضف للسلة`; }, 1000);
        }

        function selectPayMethod(method) {
            activePaymentMethod = method;
            document.querySelectorAll('.pay-option').forEach(o => o.classList.remove('active'));
            document.getElementById('pay-' + method.toLowerCase()).classList.add('active');
            document.getElementById('visa-form-box').style.display = method === 'VISA' ? 'block' : 'none';
        }

        function openCart() {
            if(customerCart.length === 0) return alert("السلة فارغة!");
            let total = 0;
            document.getElementById('cart-items-list').innerHTML = customerCart.map(item => {
                total += (item.Price * item.qty);
                return `<div class="cart-item-row"><div class="cart-item-info"><strong>${item.Name}</strong><br><span>${item.Price} ج.م</span></div><div>x${item.qty}</div></div>`;
            }).join('');
            document.getElementById('cart-total-price').innerText = total.toFixed(2);
            document.getElementById('cart-modal').style.display = 'flex';
        }

        function closeCart() { document.getElementById('cart-modal').style.display = 'none'; }

        async function submitCustomerOrder(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-submit-order'); btn.disabled = true; btn.innerText = 'جاري الإرسال...';
            const user = JSON.parse(localStorage.getItem('ossman_customer'));
            
            const totalAmount = customerCart.reduce((sum, item) => sum + (item.Price * item.qty), 0);
            const invoiceId = 'WEB-' + Date.now();
            const address = document.getElementById('cust-address').value;

            // تجهيز بيان الأوردر التفصيلي ليظهر في شاشة الدليفري بالداش بورد
            let itemsDetailsStr = customerCart.map(i => `- ${i.Name} (العدد ${i.qty})`).join('\n');
            let fullOrderDetails = `الفاتورة: ${invoiceId}\nالعميل: ${user.name}\nالهاتف: ${user.username}\nالعنوان: ${address}\nطريقة الدفع: ${activePaymentMethod === 'COD' ? 'كاش عند الاستلام' : 'مدفوع فيزا الكتروني'}\nالأصناف:\n${itemsDetailsStr}\nالإجمالي المطلوب: ${totalAmount} ج.م`;

            const salePayload = { action: 'saveSale', invoice_id: invoiceId, cashier_id: 'ويب: ' + user.name, items: customerCart, total: totalAmount, paid: totalAmount, change: 0, payment_method: activePaymentMethod === 'COD' ? 'كاش عند الاستلام' : 'فيزا أونلاين' };
            const deliveryPayload = { action: 'saveDelivery', order_id: invoiceId, delivery_man: 'طلب جديد (أونلاين)', status: 'قيد الانتظار', details: fullOrderDetails };

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(salePayload) });
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(deliveryPayload) });
                alert("🎉 تم إرسال طلبك للماركت وجاري تحضيره وتجهيز الدليفري!");
                customerCart = []; document.getElementById('cart-count').innerText = "0";
                closeCart(); loadMarketProducts();
            } catch (err) { alert("خطأ في الشبكة"); }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب للتحضير';
        }
    </script>
</body>
</html>
