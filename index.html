<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>السوبر ماركت الجبار</title>
    <!-- استدعاء Tailwind CSS للتصميم الاحترافي -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- خط عربي مميز -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        /* تخصيص السكرول بار ليناسب الشكل الحديث */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background-color: #fca5a5; border-radius: 10px; }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#ef4444', darkBg: '#111827', darkCard: '#1f2937' }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 transition-colors duration-300">

    <!-- الحاوية الرئيسية (شريط جانبي + المحتوى) -->
    <div class="flex h-screen overflow-hidden">

        <!-- القائمة الجانبية (بتختفي في الموبايل وتظهر في الكمبيوتر) -->
        <aside class="hidden md:flex flex-col w-64 bg-white dark:bg-darkCard shadow-2xl z-20">
            <div class="p-6 flex justify-center border-b dark:border-gray-700">
                <!-- اللوجو بتاعك متوظف صح المرادي -->
                <img src="https://adelabdulrahman026-byte.github.io/dashboard/Gemini_Generated_Image_2whe032whe032whe.png" alt="Logo" class="h-20 rounded-xl shadow-md object-cover">
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <a href="#" class="block p-3 rounded-lg bg-red-50 text-primary dark:bg-red-900/30 dark:text-red-400 font-bold hover:bg-red-100 transition">🛒 الرئيسية والعروض</a>
                <a href="#" class="block p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🥩 اللحوم والدواجن</a>
                <a href="#" class="block p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">🧀 الألبان والجبن</a>
                <a href="#" class="block p-3 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition">📦 سجل طلباتي</a>
            </nav>
        </aside>

        <!-- منطقة المحتوى الرئيسية -->
        <div class="flex-1 flex flex-col relative overflow-y-auto w-full">
            
            <!-- الهيدر العلوي -->
            <header class="flex items-center justify-between p-4 bg-white dark:bg-darkCard shadow-sm sticky top-0 z-10">
                <!-- زرار القائمة للموبايل -->
                <button class="md:hidden p-2 bg-gray-100 dark:bg-gray-800 rounded-lg">☰ الأقسام</button>
                
                <!-- أزرار التحكم (بحث، مود ليلي، سلة، دخول) -->
                <div class="flex items-center gap-4 w-full md:w-auto justify-end">
                    <input type="text" placeholder="ابحث عن منتج..." class="hidden md:block px-4 py-2 bg-gray-100 dark:bg-gray-800 border-none rounded-full focus:ring-2 focus:ring-primary outline-none">
                    <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 bg-gray-200 dark:bg-gray-700 rounded-full hover:scale-110 transition">🌗</button>
                    <button class="relative p-2 bg-red-100 dark:bg-red-900/40 text-primary rounded-full">
                        🛒 <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 flex items-center justify-center rounded-full">3</span>
                    </button>
                    <button class="px-4 py-2 bg-primary text-white font-bold rounded-lg shadow-lg hover:bg-red-600 transition flex items-center gap-2">
                        تسجيل دخول <span>G</span>
                    </button>
                </div>
            </header>

            <!-- محتوى الصفحة -->
            <main class="p-6 space-y-8">
                <!-- سلايد شو العروض (الهيرو) -->
                <section class="relative w-full h-48 md:h-80 bg-gradient-to-r from-red-500 to-orange-400 rounded-3xl overflow-hidden shadow-xl flex items-center justify-center text-white">
                    <div class="text-center z-10">
                        <h1 class="text-3xl md:text-5xl font-black mb-4">أقوى عروض الأسبوع 🔥</h1>
                        <p class="text-lg md:text-xl">خصومات تصل لـ 50% على المنتجات الغذائية</p>
                    </div>
                    <!-- طبقة شفافة للتصميم -->
                    <div class="absolute inset-0 bg-black/20"></div>
                </section>

                <!-- قسم سلايد شو الفيديوهات التلقائية -->
                <section>
                    <h2 class="text-2xl font-bold mb-4 border-r-4 border-primary pr-3">📺 فيديوهات المنتجات</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- مكان الفيديوهات -->
                        <div class="h-48 bg-gray-200 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-inner">
                            <span class="text-gray-500 dark:text-gray-400">فيديو عرض 1 ▶️</span>
                        </div>
                        <div class="h-48 bg-gray-200 dark:bg-gray-800 rounded-2xl flex items-center justify-center shadow-inner">
                            <span class="text-gray-500 dark:text-gray-400">فيديو عرض 2 ▶️</span>
                        </div>
                        <div class="hidden md:flex h-48 bg-gray-200 dark:bg-gray-800 rounded-2xl items-center justify-center shadow-inner">
                            <span class="text-gray-500 dark:text-gray-400">فيديو عرض 3 ▶️</span>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

</body>
</html>
